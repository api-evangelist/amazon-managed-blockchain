naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Managed Blockchain"
  description: "API for creating and managing scalable blockchain networks using Hyperledger Fabric and Ethereum on AWS."
  tags:
    - Amazon
    - Blockchain
    - Hyperledger Fabric
    - Ethereum
    - Distributed Ledger
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: managed-blockchain
      baseUri: https://managedblockchain.amazonaws.com
      description: "Amazon Managed Blockchain REST API"
      authentication:
        type: apikey
        key: Authorization
        value: "AWS4-HMAC-SHA256 {{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: networks
          path: /networks
          description: "Manage blockchain networks"
          operations:
            - name: list-networks
              method: GET
              description: "List blockchain networks"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-network
              method: POST
              description: "Create a blockchain network"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: members
          path: /networks/{networkId}/members
          description: "Manage network members"
          operations:
            - name: list-members
              method: GET
              description: "List network members"
              inputParameters:
                - name: networkId
                  in: path
                  type: string
                  required: true
                  description: "Network ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-member
              method: POST
              description: "Create a network member"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nodes
          path: /networks/{networkId}/nodes
          description: "Manage peer nodes"
          operations:
            - name: list-nodes
              method: GET
              description: "List nodes in a network"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-node
              method: POST
              description: "Create a peer node"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: managed-blockchain-api
      resources:
        - path: /v1/networks
          name: networks
          description: "Blockchain networks"
          operations:
            - method: GET
              name: list-networks
              description: "List networks"
              call: "managed-blockchain.list-networks"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-network
              description: "Create network"
              call: "managed-blockchain.create-network"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: managed-blockchain-mcp
      transport: http
      tools:
        - name: list-blockchain-networks
          description: "List all Amazon Managed Blockchain networks"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "managed-blockchain.list-networks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-blockchain-network
          description: "Create a new blockchain network using Hyperledger Fabric or Ethereum"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "managed-blockchain.create-network"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-network-members
          description: "List all members in a blockchain network"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "managed-blockchain.list-members"
          with:
            networkId: "tools.networkId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-network-member
          description: "Create a new member in a blockchain network"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "managed-blockchain.create-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-peer-nodes
          description: "List peer nodes in a blockchain network"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "managed-blockchain.list-nodes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-peer-node
          description: "Create a peer node in a blockchain network"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "managed-blockchain.create-node"
          outputParameters:
            - type: object
              mapping: "$."
