created: '2024-01-15'
modified: '2026-03-16'
apis:
- name: Amazon Managed Blockchain API
  description: >-
    The Amazon Managed Blockchain API provides a fully managed service for
    creating and managing scalable blockchain networks using open-source
    frameworks such as Hyperledger Fabric and Ethereum. The API allows you to
    create blockchain networks, invite and manage network members, create and
    configure peer nodes, manage proposals and voting, and interact with
    blockchain networks. It eliminates the overhead of creating networks and
    automatically scales to meet application demands.
