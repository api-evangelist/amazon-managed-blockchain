aid: amazon-managed-blockchain
name: Amazon Managed Blockchain
description: >-
  Amazon Managed Blockchain is a fully managed service that allows you to create and manage
  scalable blockchain networks using popular open-source frameworks such as Hyperledger Fabric
  and Ethereum. It eliminates the overhead required to create the network or join a public
  network, and automatically scales to meet the demands of thousands of applications running
  millions of transactions.
