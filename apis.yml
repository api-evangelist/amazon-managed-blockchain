    description: >-
      The Amazon Managed Blockchain API provides a fully managed service for creating and managing
      scalable blockchain networks using open-source frameworks such as Hyperledger Fabric and
      Ethereum. Covers 27 operations for networks, members, nodes, proposals, invitations, and
      accessors management.
